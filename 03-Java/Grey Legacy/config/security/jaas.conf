// =============================================================================
// Grey Legacy Insurance Claims System — JAAS Configuration
// =============================================================================
//
// This file defines the JAAS (Java Authentication and Authorization Service)
// login configuration for the Grey Legacy claims processing system.
//
// USAGE:
//   Pass to the JVM via system property:
//     -Djava.security.auth.login.config=/path/to/jaas.conf
//
//   Or for Tomcat, set in CATALINA_OPTS:
//     export CATALINA_OPTS="-Djava.security.auth.login.config=$CATALINA_HOME/conf/jaas.conf"
//
//   For JBoss/WildFly, configure via standalone.xml <security-domain> elements
//   (see config/jboss/standalone-greylegacy.xml) rather than this file.
//
// LOGIN MODULE FLAGS (JAAS standard):
//   required    — must succeed; login fails if this module fails
//   requisite   — must succeed; login fails immediately (no further modules tried)
//   sufficient  — if it succeeds, overall login succeeds (unless a prior required failed)
//   optional    — success/failure does not affect overall outcome
//
// =============================================================================

// ---------------------------------------------------------------------------
// Primary application login context
//
// Used by the web application for form-based login and container-managed
// security (<security-constraint> in web.xml).
//
// Tomcat integration:
//   In server.xml, configure a JAASRealm pointing to this context:
//     <Realm className="org.apache.catalina.realm.JAASRealm"
//            appName="GreyLegacy"
//            userClassNames="com.greylegacy.web.security.GreyLegacyLoginModule$GreyLegacyUserPrincipal"
//            roleClassNames="com.greylegacy.web.security.GreyLegacyLoginModule$GreyLegacyRolePrincipal"/>
// ---------------------------------------------------------------------------
GreyLegacy {
    com.greylegacy.web.security.GreyLegacyLoginModule required
        dsJndiName="java:comp/env/jdbc/GreyLegacyDS"
        hashAlgorithm="SHA-256"
        userQuery="SELECT PASSWORD, ENABLED, LOCKED FROM APP_USER WHERE USERNAME = ?"
        roleQuery="SELECT ROLE_NAME FROM APP_USER_ROLE WHERE USERNAME = ?"
        debug="true";
};

// ---------------------------------------------------------------------------
// Web Services login context (for SOAP/WS-Security UsernameToken)
//
// Uses the same LoginModule but with a different JNDI name to allow
// separate DataSource configuration for service accounts vs. web users.
// In practice this often points to the same DataSource but the separation
// allows future divergence (e.g., LDAP for web, database for services).
// ---------------------------------------------------------------------------
GreyLegacyWS {
    com.greylegacy.web.security.GreyLegacyLoginModule required
        dsJndiName="java:comp/env/jdbc/GreyLegacyDS"
        hashAlgorithm="SHA-256"
        userQuery="SELECT PASSWORD, ENABLED, LOCKED FROM APP_USER WHERE USERNAME = ? AND EXISTS (SELECT 1 FROM APP_USER_ROLE WHERE USERNAME = APP_USER.USERNAME AND ROLE_NAME = 'WS_CLIENT')"
        roleQuery="SELECT ROLE_NAME FROM APP_USER_ROLE WHERE USERNAME = ?"
        debug="true";
};

// ---------------------------------------------------------------------------
// Batch processing login context
//
// Used by scheduled batch jobs (Quartz, Spring Batch) that need to
// authenticate as a system service account. The service account has
// the SYSTEM_BATCH role granting access to batch-only operations.
// ---------------------------------------------------------------------------
GreyLegacyBatch {
    com.greylegacy.web.security.GreyLegacyLoginModule required
        dsJndiName="java:comp/env/jdbc/GreyLegacyDS"
        hashAlgorithm="SHA-256"
        userQuery="SELECT PASSWORD, ENABLED, LOCKED FROM APP_USER WHERE USERNAME = ? AND EXISTS (SELECT 1 FROM APP_USER_ROLE WHERE USERNAME = APP_USER.USERNAME AND ROLE_NAME = 'SYSTEM_BATCH')"
        roleQuery="SELECT ROLE_NAME FROM APP_USER_ROLE WHERE USERNAME = ?"
        debug="false";
};

// ---------------------------------------------------------------------------
// JMX Remote access login context
//
// Used when JMX remote access requires authentication. The JMX connector
// is configured in server.xml with JmxRemoteLifecycleListener.
// Only ADMIN role holders can access JMX.
// ---------------------------------------------------------------------------
GreyLegacyJMX {
    com.greylegacy.web.security.GreyLegacyLoginModule required
        dsJndiName="java:comp/env/jdbc/GreyLegacyDS"
        hashAlgorithm="SHA-256"
        userQuery="SELECT PASSWORD, ENABLED, LOCKED FROM APP_USER WHERE USERNAME = ? AND EXISTS (SELECT 1 FROM APP_USER_ROLE WHERE USERNAME = APP_USER.USERNAME AND ROLE_NAME = 'ADMIN')"
        roleQuery="SELECT ROLE_NAME FROM APP_USER_ROLE WHERE USERNAME = ?"
        debug="false";
};
