# Grey Legacy Application Configuration
app.name=Grey Legacy Claims System
app.version=1.0.0
app.environment=development

# Claim number generation
claim.number.prefix=CLM
payment.number.prefix=PAY

# Fraud scoring thresholds
fraud.score.low.max=25
fraud.score.medium.max=50
fraud.score.high.max=75
fraud.score.critical.min=76

# Batch job settings
batch.claim.aging.threshold.days=30
batch.fraud.scoring.batch.size=100
batch.payout.scheduling.enabled=true
batch.premium.recalculation.enabled=true

# Session timeout (minutes)
session.timeout.minutes=30
