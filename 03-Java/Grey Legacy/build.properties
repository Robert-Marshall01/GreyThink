# ==============================================================================
# Grey Legacy Insurance Claims System - Ant Build Properties
#
# Environment-specific build configuration. This file should be customized
# per developer workstation or build server. Do NOT commit sensitive
# credentials to source control.
#
# Last Modified: 2025-11-15
# ==============================================================================

# --- Java Compiler Settings ---
java.source=1.8
java.target=1.8

# --- Application Settings ---
app.name=grey-legacy
app.version=1.0.0-SNAPSHOT
app.display.name=Grey Legacy Insurance Claims System

# --- Deployment Settings ---
tomcat.home=/opt/tomcat
deploy.server=prod-server-01
deploy.port=22
deploy.user=deployer
deploy.path=/opt/tomcat/webapps

# --- Database Settings ---
db.host=localhost
db.port=1521
db.name=GREYLEGACY
db.schema=CLAIMS
db.driver=oracle.jdbc.OracleDriver
db.url=jdbc:oracle:thin:@${db.host}:${db.port}:${db.name}

# --- Build Behavior ---
# Set to true to skip running tests during build
skip.tests=false
# Set to true to enable verbose compiler output
verbose.compile=false
