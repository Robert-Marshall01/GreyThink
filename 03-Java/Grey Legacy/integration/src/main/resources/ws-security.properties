# ==============================================================================
# WS-Security Service Account Credentials
# ==============================================================================
# This file stores passwords for service accounts used by external partners
# to authenticate against Grey Legacy's SOAP web services via WS-Security
# UsernameToken authentication.
#
# Format: ws.user.<username>=<password>
#
# SECURITY NOTE:
#   - This properties file is for DEVELOPMENT and TESTING ONLY.
#   - In production, credentials must be managed via:
#       * LDAP/Active Directory integration
#       * HashiCorp Vault or AWS Secrets Manager
#       * JNDI-bound credentials from the app server
#       * Java KeyStore (JKS) for certificate-based authentication
#   - NEVER commit production credentials to version control.
#   - These development credentials are intentionally weak.
# ==============================================================================

# --- Partner Service Accounts ---

# Primary reinsurance partner (SwissRe integration)
ws.user.reinsurance_partner=dev_reinsurance_2024

# Third-party claims adjuster system (Crawford & Company)
ws.user.adjuster_system=dev_adjuster_2024

# State regulatory reporting system
ws.user.regulatory_reporter=dev_regulatory_2024

# Internal batch system (Spring Batch claim export jobs)
ws.user.batch_system=dev_batch_2024

# Legacy mainframe bridge (CICS transaction gateway)
ws.user.mainframe_bridge=dev_mainframe_2024

# Data warehouse ETL process
ws.user.etl_service=dev_etl_2024

# --- Configuration ---

# Password encoding type: PLAIN, SHA1, SHA256
ws.password.encoding=PLAIN

# Maximum failed authentication attempts before lockout (per username)
ws.auth.max.failures=5

# Lockout duration in minutes
ws.auth.lockout.minutes=30
