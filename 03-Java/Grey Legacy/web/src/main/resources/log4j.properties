# Grey Legacy Log4j Configuration
log4j.rootLogger=INFO, stdout, file

# Console Appender
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5p %c{1} - %m%n

# File Appender
log4j.appender.file=org.apache.log4j.RollingFileAppender
log4j.appender.file.File=${catalina.home}/logs/greylegacy.log
log4j.appender.file.MaxFileSize=10MB
log4j.appender.file.MaxBackupIndex=10
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] [%X{user}] %-5p %c - %m%n

# Application logging
log4j.logger.com.greylegacy=DEBUG
log4j.logger.com.greylegacy.dao=DEBUG
log4j.logger.com.greylegacy.service=DEBUG
log4j.logger.com.greylegacy.web=DEBUG
log4j.logger.com.greylegacy.batch=DEBUG

# Hibernate logging
log4j.logger.org.hibernate=WARN
log4j.logger.org.hibernate.SQL=DEBUG
log4j.logger.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring logging
log4j.logger.org.springframework=WARN

# Struts logging
log4j.logger.org.apache.struts=WARN

# CXF logging
log4j.logger.org.apache.cxf=WARN
