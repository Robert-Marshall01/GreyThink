# Grey Legacy Database Configuration
# Production: PostgreSQL | Development: H2 (in-memory)

# H2 Development Configuration
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:greylegacy;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
db.username=sa
db.password=

# PostgreSQL Production Configuration (uncomment for production)
# db.driver=org.postgresql.Driver
# db.url=jdbc:postgresql://localhost:5432/greylegacy
# db.username=greylegacy_app
# db.password=encrypted_password_here

# Connection Pool Settings
db.pool.minSize=5
db.pool.maxSize=20
db.pool.maxIdleTime=300
db.pool.acquireIncrement=5
db.pool.maxStatements=100
db.pool.testConnectionOnCheckout=true

# Hibernate Settings
hibernate.dialect=org.hibernate.dialect.H2Dialect
hibernate.show_sql=true
hibernate.format_sql=true
hibernate.hbm2ddl.auto=update
hibernate.jdbc.batch_size=25
hibernate.order_inserts=true
hibernate.order_updates=true
