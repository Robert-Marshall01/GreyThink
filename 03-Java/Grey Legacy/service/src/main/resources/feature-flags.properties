# ============================================================================
# Grey Legacy – Feature Flags
# ============================================================================
# Each flag controls the availability of a specific subsystem.  Set to "true"
# to enable or "false" to disable.  Changes take effect on reload or restart.
# ============================================================================

# Fraud scoring engine integration (added 2023-06-15)
feature.fraud.scoring.enabled=true

# Automatic adjudication for low-value claims (added 2023-09-01)
feature.auto.adjudication.enabled=false

# SOAP web-service endpoints (legacy; added 2019-03-10)
feature.soap.endpoints.enabled=true

# JMS/ActiveMQ claim event notifications (added 2022-01-20)
feature.jms.notifications.enabled=true

# Spring Batch nightly batch processing (added 2021-11-05)
feature.batch.processing.enabled=true

# REST API layer – new JSON endpoints (added 2024-04-12)
feature.rest.api.enabled=true

# CSV bulk-import for external claim feeds (added 2022-07-30)
feature.csv.import.enabled=false

# Slowly-Changing-Dimension history tracking (added 2024-08-18)
feature.scd.history.enabled=false

# Pessimistic locking on claim edits (added 2023-02-25)
feature.pessimistic.locking.enabled=true
