# ============================================================================
# Grey Legacy Modernization - Spring Boot Application Configuration
# ============================================================================
# Replaces the scattered XML + .properties configuration from legacy modules:
#   - database.properties → spring.datasource.*
#   - application.properties → app.*
#   - log4j.properties → logging.*
#   - applicationContext-dao.xml → spring.jpa.*
#   - hibernate.cfg.xml → spring.jpa.properties.*
# ============================================================================

spring:
  application:
    name: grey-legacy-modern

  # ---------------------------------------------------------------------------
  # DataSource — replaces C3P0 ComboPooledDataSource in applicationContext-dao.xml
  # Spring Boot auto-configures HikariCP (the modern replacement for C3P0/DBCP)
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:h2:mem:greylegacy;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      pool-name: GreyLegacyHikariPool

  # ---------------------------------------------------------------------------
  # JPA / Hibernate — replaces hibernate.cfg.xml and sessionFactory bean
  # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: none  # Flyway manages schema now — never use "update" in production
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: false
        format_sql: true
        use_sql_comments: true
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
        jdbc.batch_versioned_data: true
        cache:
          use_second_level_cache: false
          use_query_cache: false
    open-in-view: false  # Disable OSIV anti-pattern

  # ---------------------------------------------------------------------------
  # Flyway — replaces hbm2ddl.auto for schema management
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: '0'
    validate-on-migrate: true

  # ---------------------------------------------------------------------------
  # H2 Console (dev only)
  # ---------------------------------------------------------------------------
  h2:
    console:
      enabled: true
      path: /h2-console

# =============================================================================
# Server Configuration
# =============================================================================
server:
  port: 8080
  servlet:
    context-path: /grey-legacy
  error:
    include-message: always
    include-stacktrace: never

# =============================================================================
# Spring Boot Actuator — replaces JMX MBeans for operational monitoring
# =============================================================================
# LEGACY: Custom MBeans (ClaimProcessingMBean, ConnectionPoolMonitorMBean)
#         accessed via JConsole/VisualVM on JMX port 1099
# MODERN: HTTP endpoints auto-exposed at /actuator/*
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,flyway,beans,env
  endpoint:
    health:
      show-details: when-authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: grey-legacy
      environment: development
    export:
      prometheus:
        enabled: true

# =============================================================================
# Logging — replaces log4j.properties
# =============================================================================
logging:
  level:
    com.greylegacy: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] [%X{user}] %-5level %logger - %msg%n"
  file:
    name: logs/grey-legacy-modern.log
    max-size: 10MB
    max-history: 30

# =============================================================================
# Application Properties (custom)
# =============================================================================
app:
  name: Grey Legacy Claims System (Modernized)
  version: 2.0.0
  claim:
    number-prefix: CLM
  payment:
    number-prefix: PAY
  fraud:
    score:
      low-max: 25
      medium-max: 50
      high-max: 75
      critical-min: 76
